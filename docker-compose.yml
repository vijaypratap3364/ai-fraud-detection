version: '3.8'

services:
  # API Service - FastAPI backend with agent investigation
  api:
    build: .
    command: python src/api/main.py
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Dashboard Service - Streamlit frontend
  dashboard:
    build: .
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    depends_on:
      - api
    restart: unless-stopped

  # Stream Simulator - Run separately or as a job
  simulator:
    build: .
    command: python src/simulation/stream.py --rate 5 --speed 1 --loop
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    # Comment out to run manually instead
    # profiles: ["simulator"]

volumes:
  data:
  chroma_db:
  models: